name: Publish to Steam Workshop

# Reusable workflow: packs a GMod addon with fastgmad and publishes it to a Steam
# Workshop item. Two login modes, selected by `mfa`:
#   mfa: false - direct login (STEAM_USERNAME/PASSWORD only), for beta/dev items
#     owned by a 2FA-disabled account.
#   mfa: true  - the owner (main) account logs in with a live Steam Guard code
#     entered on your phone at run time (never stored). The code round-trips via
#     Home Assistant -> ntfy: this job pings HA, HA prompts your phone, you reply,
#     HA publishes the code to ntfy, and this job reads it back.
on:
  workflow_call:
    inputs:
      workshop_id:
        description: "Target Steam Workshop item id"
        type: string
        required: true
      mfa:
        description: "Use the phone-entered Steam Guard flow (owner account) instead of direct login"
        type: boolean
        default: false
      addon:
        description: "Addon display name shown in the phone prompt (mfa only)"
        type: string
        default: ""
      dry_run:
        description: "Log in and build the .gma but skip the Workshop upload"
        type: boolean
        default: false
      content_folder:
        description: "Folder within the addon repo to pack (relative; ignored when merge_repo is set)"
        type: string
        default: "."
      merge_repo:
        description: "Optional extra repo merged under the addon before packing (e.g. AmyJeanes/world-portals)"
        type: string
        default: ""
      merge_ref:
        description: "Ref of merge_repo to check out"
        type: string
        default: ""
      addon_ref:
        description: "Ref of the addon repo to check out (default: the triggering ref)"
        type: string
        default: ""
      version:
        description: "Release version/tag, shown as the linked headline in the Steam change note"
        type: string
        default: ""
      release_url:
        description: "GitHub release URL the change note links to"
        type: string
        default: ""
      release_body:
        description: "GitHub release body; its '## Summary' first paragraph seeds a single-addon change note"
        type: string
        default: ""
      preview_tag:
        description: "Dry-run preview: resolve this release tag's notes, log the change note, and skip the prompt + upload"
        type: string
        default: ""
    outputs:
      uploaded:
        description: "true when a real Workshop upload succeeded (false for a dry run, preview, or mfa-denied)"
        value: ${{ jobs.publish.outputs.uploaded }}
    secrets:
      STEAM_USERNAME:
        required: true
      STEAM_PASSWORD:
        required: true
      HA_WEBHOOK_URL:
        required: false
      NTFY_CI_PASSWORD:
        required: false
      DISCORD_WEBHOOK_URL:
        required: false

permissions:
  contents: read

concurrency:
  # Serialise runs targeting the same item; different items publish in parallel.
  group: workshop-publish-${{ inputs.workshop_id }}
  cancel-in-progress: false

env:
  NTFY_URL: "https://ntfy.amyjeanes.com"
  NTFY_TOPIC: "steam-release"
  # renovate: datasource=github-releases depName=WilliamVenner/fastgmad
  FASTGMAD_VERSION: "v0.2.1"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    outputs:
      uploaded: ${{ steps.upload.outputs.uploaded }}
    permissions:
      contents: read
    steps:
      - name: Checkout addon
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ inputs.preview_tag || inputs.addon_ref }} # preview tag, else pinned addon_ref, else the triggering ref
          fetch-depth: 0 # need tags so the checked-out commit resolves to a release version
          path: addon

      - name: Checkout merge repo
        if: inputs.merge_repo != ''
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: ${{ inputs.merge_repo }}
          ref: ${{ inputs.merge_ref }}
          path: merge
          fetch-depth: 0 # need tags so the bundled commit resolves to a release version

      # Addons opt in to build-time codegen by having the script; it runs in the addon
      # checkout (not the assembled content dir) so it can read git, and before the merge
      # copy so anything it writes is picked up. Standard GITHUB_* env is available.
      - name: Pre-pack hook
        if: hashFiles('addon/scripts/pre-pack.ps1') != ''
        working-directory: addon
        shell: pwsh
        run: ./scripts/pre-pack.ps1

      # All the slow setup (SteamCMD, fastgmad, packing) runs BEFORE the Guard-code
      # prompt, so an mfa code is consumed within seconds of your reply and can't
      # go stale.
      - name: Install SteamCMD
        if: inputs.preview_tag == '' # a change-note preview never logs in
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lib32gcc-s1
          mkdir -p "$HOME/Steam"
          curl -fsSL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz | tar zxf - -C "$HOME/Steam"
          "$HOME/Steam/steamcmd.sh" +quit >/dev/null 2>&1 || true # bootstrap/self-update so login is instant later

      - name: Install fastgmad
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/fastgmad.zip "https://github.com/WilliamVenner/fastgmad/releases/download/${FASTGMAD_VERSION}/fastgmad_linux.zip"
          unzip -oq /tmp/fastgmad.zip -d /tmp/fastgmad
          chmod +x /tmp/fastgmad/fastgmad

      - name: Pack the addon into a .gma
        env:
          MERGE_REPO: ${{ inputs.merge_repo }}
          CONTENT_FOLDER: ${{ inputs.content_folder }}
        run: |
          set -euo pipefail
          if [ -n "$MERGE_REPO" ]; then
            # Merge two repos into one addon: the glob takes their content but not
            # their top-level repo-management dotfiles (.git/.github/.vscode/...),
            # which the addon.json ignore list doesn't cover. addon copied last so
            # its addon.json wins on conflicts and governs packing.
            content=/tmp/content
            mkdir -p "$content"
            cp -r merge/* "$content"/
            cp -r addon/* "$content"/
          else
            content="addon/$CONTENT_FOLDER"
          fi
          mkdir -p /tmp/addon
          ( cd "$content" && /tmp/fastgmad/fastgmad create -folder . -out /tmp/addon/addon.gma )

      - name: Resolve change-note source
        env:
          GH_TOKEN: ${{ github.token }}
          THIS_REPO: ${{ github.repository }}
          PREVIEW_TAG: ${{ inputs.preview_tag }}
          IN_VERSION: ${{ inputs.version }}
          IN_URL: ${{ inputs.release_url }}
          IN_BODY: ${{ inputs.release_body }}
        run: |
          set -euo pipefail
          if [ -n "$PREVIEW_TAG" ]; then
            # Dry-run preview: pull the change-note source from the named release.
            gh release view "$PREVIEW_TAG" --repo "$THIS_REPO" --json tagName,url,body > /tmp/rel.json
            jq -rj '.tagName // ""' /tmp/rel.json > /tmp/cn_version
            jq -rj '.url // ""'     /tmp/rel.json > /tmp/cn_url
            jq -r  '.body // ""'    /tmp/rel.json > /tmp/cn_body
          else
            printf '%s' "$IN_VERSION" > /tmp/cn_version
            printf '%s' "$IN_URL"     > /tmp/cn_url
            printf '%s' "$IN_BODY"    > /tmp/cn_body
          fi

      - name: Compose Steam change note
        env:
          ADDON: ${{ inputs.addon }}
          MERGE_REPO: ${{ inputs.merge_repo }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(cat /tmp/cn_version)
          RELEASE_URL=$(cat /tmp/cn_url)
          RELEASE_BODY=$(cat /tmp/cn_body)
          note=/tmp/changenote.txt
          footer="For the full changelog, see the link above."
          footer_plural="For the full changelogs, see the links above."

          # First paragraph under a "## Summary" heading, else empty. Reads the body on stdin.
          summarize() {
            awk '
              /^##[[:space:]]*[Ss]ummary/ { insum=1; next }
              insum && /^##[[:space:]]/ { exit }
              insum {
                if ($0 ~ /^[[:space:]]*$/) { if (started) exit; else next }
                started=1; print
              }'
          }

          # Emit "<label>:\n[url]tag[/url]\n\n<summary>" for a bundled component checked out
          # at <dir>. Links its release (with the ## Summary) when HEAD is a tagged commit,
          # else falls back to the plain commit link.
          component() {
            local label="$1" dir="$2" repo="$3" tag body sum sha short
            if tag=$(git -C "$dir" describe --tags --exact-match HEAD 2>/dev/null); then
              printf '%s:\n[url=%s/%s/releases/tag/%s]%s[/url]\n' "$label" "$GITHUB_SERVER_URL" "$repo" "$tag" "$tag"
              body=$(gh release view "$tag" --repo "$repo" --json body -q .body 2>/dev/null || true)
              sum=$(printf '%s' "$body" | tr -d '\r' | summarize)
              [ -n "$sum" ] && printf '\n%s\n' "$sum" || true
            else
              sha=$(git -C "$dir" rev-parse HEAD)
              short=$(git -C "$dir" rev-parse --short HEAD)
              printf '%s:\n[url=%s/%s/commit/%s]%s[/url]\n' "$label" "$GITHUB_SERVER_URL" "$repo" "$sha" "$short"
            fi
          }

          if [ -n "$MERGE_REPO" ]; then
            # Merged addon (Doors): one block per bundled component, each showing its own
            # latest release version + summary. Trigger-agnostic - either addon's release
            # produces the same note.
            label=$(basename "$MERGE_REPO" | sed -E 's/[-_]+/ /g' | awk '{for(i=1;i<=NF;i++)$i=toupper(substr($i,1,1)) substr($i,2)}1')
            {
              component "$ADDON" addon "$GITHUB_REPOSITORY"
              printf '\n'
              component "$label" merge "$MERGE_REPO"
              printf '\n%s\n' "$footer_plural"
            } > "$note"
          elif [ -z "$RELEASE_URL" ]; then
            # No release context, single addon (a dry run or beta build) - point at the commit.
            printf '%s\n' "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}" > "$note"
          else
            # Single addon (Sonic/TARDIS): linked version, the release body's ## Summary,
            # then the footer pointing back at the linked release.
            summary=$(printf '%s' "$RELEASE_BODY" | tr -d '\r' | summarize)
            {
              printf '[url=%s]%s[/url]\n' "$RELEASE_URL" "$VERSION"
              [ -n "$summary" ] && printf '\n%s\n' "$summary" || true
              printf '\n%s\n' "$footer"
            } > "$note"
          fi
          echo "::group::Steam change note"; cat "$note"; echo "::endgroup::"

      - name: Request Steam Guard code via Home Assistant and wait
        id: guard
        if: inputs.mfa && inputs.preview_tag == ''
        env:
          HA_WEBHOOK_URL: ${{ secrets.HA_WEBHOOK_URL }}
          NTFY_CI_PASSWORD: ${{ secrets.NTFY_CI_PASSWORD }}
          ADDON: ${{ inputs.addon }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          nonce=$(head -c 16 /dev/urandom | od -An -tx1 | tr -d ' \n')
          echo "nonce=$nonce" >> "$GITHUB_OUTPUT"
          echo "Prompting your phone (nonce ${nonce})..."
          curl -fsS -X POST "$HA_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"addon\":\"${ADDON}\",\"sha\":\"${GITHUB_SHA}\",\"nonce\":\"${nonce}\",\"run_url\":\"${RUN_URL}\"}"
          echo "Waiting up to 10 minutes for the Steam Guard code (reply on your phone)..."
          deadline=$(( $(date +%s) + 600 ))
          code=""
          while [ "$(date +%s)" -lt "$deadline" ]; do
            code=$(curl -fsS -u "ci:${NTFY_CI_PASSWORD}" \
              "${NTFY_URL}/${NTFY_TOPIC}/json?poll=1&since=10m" \
              | jq -r --arg n "$nonce" 'select(.event=="message") | select(.title==$n) | .message' \
              | tail -n1 || true)
            if [ "$code" = "deny" ]; then
              # Cancel is a deliberate skip, not a failure - end green with the
              # upload skipped rather than a red run + failure email.
              echo "Publish cancelled on your phone; skipping the upload."
              echo "denied=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ -n "$code" ]; then break; fi
            sleep 3
          done
          if [ -z "$code" ]; then echo "::error::No Steam Guard code received within 10 minutes."; exit 1; fi
          echo "::add-mask::$code"
          echo "code=$code" >> "$GITHUB_OUTPUT"

      - name: Publish to Steam Workshop
        id: upload
        if: steps.guard.outputs.denied != 'true' && inputs.preview_tag == ''
        # Secrets are scoped to this one step. Split login: consume the login (and,
        # for mfa, the Guard code) first, then upload with the established session.
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          GUARD_CODE: ${{ steps.guard.outputs.code }}
          MFA: ${{ inputs.mfa }}
          DRY_RUN: ${{ inputs.dry_run }}
          WORKSHOP_ID: ${{ inputs.workshop_id }}
        run: |
          set -euo pipefail
          if [ "$MFA" = "true" ]; then
            "$HOME/Steam/steamcmd.sh" +login "$STEAM_USERNAME" "$STEAM_PASSWORD" "$GUARD_CODE" +quit
          else
            "$HOME/Steam/steamcmd.sh" +login "$STEAM_USERNAME" "$STEAM_PASSWORD" +quit
          fi
          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "Dry run: logged in successfully; skipping the Workshop upload."
            exit 0
          fi
          # Escape the composed change note for KeyValues, then inject it with printf
          # (not heredoc expansion) so nothing in the release notes is re-evaluated.
          note=$(sed -e 's/\\/\\\\/g' -e 's/"/\\"/g' /tmp/changenote.txt)
          {
            printf '"workshopitem"\n{\n'
            printf '\t"appid" "4000"\n'
            printf '\t"publishedfileid" "%s"\n' "$WORKSHOP_ID"
            printf '\t"contentfolder" "/tmp/addon/addon.gma"\n'
            printf '\t"changenote" "%s"\n' "$note"
            printf '}\n'
          } > /tmp/addon/addon.vdf
          "$HOME/Steam/steamcmd.sh" +login "$STEAM_USERNAME" +workshop_build_item /tmp/addon/addon.vdf +quit
          echo "uploaded=true" >> "$GITHUB_OUTPUT"

      - name: Show SteamCMD logs on failure
        if: failure()
        run: |
          echo "::group::workshop_log.txt"; cat "$HOME/Steam/logs/workshop_log.txt" 2>/dev/null || true; echo "::endgroup::"
          echo "::group::stderr.txt"; cat "$HOME/Steam/logs/stderr.txt" 2>/dev/null || true; echo "::endgroup::"

      - name: Announce the update on Discord
        # Success only - a dry run, a preview or an mfa-denied publish stays quiet.
        if: steps.upload.outputs.uploaded == 'true'
        continue-on-error: true # the item is already live; a failed post must not red the run
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ADDON: ${{ inputs.addon }}
          WORKSHOP_ID: ${{ inputs.workshop_id }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then echo "No Discord webhook set; skipping."; exit 0; fi
          url="https://steamcommunity.com/sharedfiles/filedetails/?id=${WORKSHOP_ID}"
          # The item's own title already carries the channel ("TARDIS (Beta)"), so name it from
          # that rather than the addon input. Scraped from the page, not the web API: beta items
          # are unlisted, and the API reports those as not-found while the page still serves them.
          og=$(curl -fsS --max-time 15 --retry 3 --retry-delay 2 "$url" \
            | grep -o '<meta property="og:title" content="[^"]*"' | head -n1 \
            | sed -e 's/.*content="//' -e 's/"$//' || true)
          case "$og" in
            # An item page titles itself "Steam Workshop::<title>"; anything else is Steam's
            # error page (served as a 200) or a relaid-out page - fall back on the addon name.
            "Steam Workshop::"?*)
              title=$(printf '%s' "${og#Steam Workshop::}" \
                | sed -e 's/&amp;/\&/g' -e 's/&lt;/</g' -e 's/&gt;/>/g' -e 's/&quot;/"/g' -e "s/&#39;/'/g") ;;
            *) title="$ADDON" ;;
          esac
          jq -n --arg t "$title" --arg u "$url" \
            '{content: "[\($t)](\($u)) has been updated on Steam Workshop", allowed_mentions: {parse: []}}' \
            | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$DISCORD_WEBHOOK_URL" >/dev/null
          echo "Announced: $title"

      - name: Report result to Home Assistant
        # For mfa, always update the phone notification (same tag) with the outcome.
        # For direct-login (beta) runs, stay silent unless the job failed - then send
        # a standalone failure notification (tagged by run id, no prompt to replace).
        if: always() && (inputs.mfa || failure()) && inputs.preview_tag == ''
        env:
          HA_WEBHOOK_URL: ${{ secrets.HA_WEBHOOK_URL }}
          ADDON: ${{ inputs.addon }}
          GUARD_NONCE: ${{ steps.guard.outputs.nonce }}
          DENIED: ${{ steps.guard.outputs.denied }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          nonce="${GUARD_NONCE:-}"
          if [ -z "$nonce" ]; then nonce="run-${RUN_ID}"; fi # beta failure has no prompt; tag by run
          status="$STATUS"
          if [ "$DENIED" = "true" ]; then status="cancelled"; fi
          curl -fsS -X POST "$HA_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"phase\":\"result\",\"addon\":\"${ADDON}\",\"nonce\":\"${nonce}\",\"status\":\"${status}\",\"run_url\":\"${RUN_URL}\"}" || true
